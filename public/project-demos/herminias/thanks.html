<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Thank You | Herminia's Food Catering</title>
<meta name="robots" content="noindex">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .thanks-wrap { min-height: 84vh; display: grid; place-items: center; padding: clamp(2rem, 1rem + 5vw, 4rem) 0; background: linear-gradient(180deg, var(--brand-tint), var(--cream) 70%); }
  .thanks-card {
    max-width: 540px; text-align: center;
    background: var(--panel); border: 1.5px solid var(--line);
    border-top: var(--accent-bar) solid var(--brand); border-radius: var(--radius);
    box-shadow: var(--shadow-lg); padding: clamp(2rem, 1.4rem + 2vw, 3rem) clamp(1.5rem, 1rem + 2vw, 2.5rem);
  }
  .thanks-card img { width: 76px; height: 76px; border-radius: 16px; margin: 0 auto 1.2rem; box-shadow: var(--shadow); }
  .thanks-card .section-lead { margin-bottom: 0; }
</style>
</head>
<body>
<main class="thanks-wrap">
  <div class="thanks-card reveal in">
    <img src="assets/herminias-logo.png" alt="Herminia's Food Catering logo">
    <p class="eyebrow">Maraming salamat</p>
    <h1>We got your inquiry</h1>
    <p class="section-lead">Thanks for reaching out to Herminia's Food Catering. We'll get back to you with a menu suggestion and quote within 24 hours. For anything urgent, call or Viber <a href="tel:+639000000000">+63 900 000 0000</a> <span class="muted">(placeholder)</span>.</p>
    <p style="margin-top:1.5rem"><a class="btn btn-primary btn-lg" href="./">← Back to home</a></p>
  </div>
</main>
</body>
</html>
