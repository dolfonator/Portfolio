<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Thank you — Justdiz Preproductions</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#20252D">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700&family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .thanks-wrap { min-height: 100vh; display: grid; place-items: center; padding: clamp(2rem, 1rem + 5vw, 4rem) 0; background: linear-gradient(180deg, #20252D, #171B22 72%); }
  .thanks-card {
    max-width: 560px; text-align: center;
    background: var(--panel); border: 1.5px solid var(--line);
    border-top: var(--accent-bar) solid var(--brand); border-radius: var(--radius);
    box-shadow: var(--shadow-lg); padding: clamp(2rem, 1.4rem + 2vw, 3rem) clamp(1.5rem, 1rem + 2vw, 2.5rem);
  }
  .thanks-logo { width: 78px; height: 78px; border-radius: 16px; padding: 8px; margin: 0 auto 1.2rem; background: #050607; border: 1px solid rgba(255,255,255,.18); box-shadow: var(--shadow); object-fit: contain; }
  .thanks-card .section-lead { margin-bottom: 0; }
</style>
</head>
<body>
<main class="thanks-wrap">
  <div class="thanks-card reveal in">
    <img src="assets/justdiz-logo.png" alt="" class="thanks-logo" aria-hidden="true">
    <p class="eyebrow">Inquiry received</p>
    <h1>Thanks for reaching out</h1>
    <p class="section-lead">This demo form has redirected successfully. In a paid build, this page would confirm the inquiry was sent to Justdiz Preproductions.</p>
    <p style="margin-top:1.5rem"><a class="btn btn-primary btn-lg" href="./">Back to home</a></p>
  </div>
</main>
</body>
</html>
